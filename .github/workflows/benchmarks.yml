name: Benchmarks

on:
  pull_request:
  push:
    branches: ['master', 'maint']

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  vs-master:

    runs-on: ubuntu-latest

    steps:
    - name: Set up system
      shell: bash
      run: |
        bash <(wget -q -O- https://neuro.debian.net/_files/neurodebian-ci-setup.sh)
        sudo apt-get update -qq
        sudo apt-get install -y eatmydata
        sudo eatmydata apt-get install -y git-annex-standalone
    - name: Set up environment
      run: |
        git config --global user.email "test@github.land"
        git config --global user.name "GitHub Almighty"
        # Prevent interactive credential entry
        # See also the GIT_ASKPASS env var below
        git config --global core.askPass ""

    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
    - name: Set up Python 3.10
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install ".[devel-docs]"
        # the benchmarks use `ls`
        pip install datalad_deprecated
        # asv-runner >= 0.2.2 mis-classifies class-level `setup(self)`
        # as a parameter-free hook and invokes it before setup_cache,
        # breaking any suite whose setup() reads what setup_cache writes.
        # See airspeed-velocity/asv_runner#52; unpin once fixed upstream.
        pip install "asv-runner<0.2.2"
    - name: Run benchmarks
      env:
        # fake environment to be able to reuse script for travis
        TRAVIS_PULL_REQUEST: true
        # Prevent interactive credential entry (note "true" is the command to run)
        GIT_ASKPASS: true

      run: |
        tools/ci/benchmark-travis-pr.sh
    - name: Compare
      run: |
        # Invocation from tools/ci/benchmark-travis-pr.sh for convenience
        asv compare refs/bm/merge-target refs/bm/pr
    - name: Fail if any benchmarks have slowed down too much
      run: |
        ! asv compare --factor 1.2 --split refs/bm/merge-target refs/bm/pr | grep -q "got worse"
